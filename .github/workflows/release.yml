name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          OUTPUT_NAME=aws-shortfall-${{ matrix.os }}-${{ matrix.arch }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -o "$OUTPUT_NAME" -ldflags="-s -w -X main.version=${VERSION}" main.go

          # Create tarball for non-Windows, zip for Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "${OUTPUT_NAME%.exe}.zip" "$OUTPUT_NAME"
          else
            tar czf "${OUTPUT_NAME}.tar.gz" "$OUTPUT_NAME"
          fi

      - name: Generate changelog
        id: changelog
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          body: |
            ## AWS EDP Shortfall Calculator ${{ steps.version.outputs.VERSION }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Installation

            Download the appropriate binary for your platform:
            - **Linux AMD64**: `aws-shortfall-linux-amd64.tar.gz`
            - **Linux ARM64**: `aws-shortfall-linux-arm64.tar.gz`
            - **macOS AMD64 (Intel)**: `aws-shortfall-darwin-amd64.tar.gz`
            - **macOS ARM64 (Apple Silicon)**: `aws-shortfall-darwin-arm64.tar.gz`
            - **Windows AMD64**: `aws-shortfall-windows-amd64.zip`

            Extract and run:
            ```bash
            # Linux/macOS
            tar xzf aws-shortfall-*.tar.gz
            ./aws-shortfall-* --profile your-profile

            # Windows
            unzip aws-shortfall-windows-amd64.zip
            .\aws-shortfall-windows-amd64.exe --profile your-profile
            ```

            ### Features
            - ✅ Automatically detects marketplace products deployed on AWS
            - ✅ Excludes non-AWS hosted products from EDP calculation
            - ✅ Uses official AWS Marketplace Discovery API
            - ✅ No manual configuration needed
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
